<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TravelWorld</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TravelWorld</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <div class="form-wrapper">
        <div class="glass-panel form-panel">
            <div class="panel-header">
                <h2>Crea tu cuenta</h2>
                <p>Únete a TravelWorld y planea tu próxima aventura</p>
            </div>
            <form id="miFormulario" onsubmit="enviarFormulario(event)">
                <div class="input-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre completo" required />
                </div>
                
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required />
                </div>
                
                <div class="input-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" name="telefono" placeholder="833-000-0000" required />
                </div>

                <div class="input-group">
                    <label for="asunto">Asunto</label>
                    <select id="asunto" name="asunto" required>
                        <option value="">Selecciona una Opción</option>
                        <option value="vuelos">Compra de Vuelos</option>
                        <option value="info">Información</option>
                        <option value="dudas">Dudas generales</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="mensaje">Mensaje (Opcional)</label>
                    <textarea id="mensaje" name="mensaje" rows="3" placeholder="Escribe tu mensaje aquí..."></textarea>
                </div>
                
                <div class="checkbox-group">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="terminos" name="terminos" required />
                        <span class="checkmark"></span>
                        <span class="label-text">Acepto los términos y condiciones</span>
                    </label>
                </div>
                
                <button type="submit" class="cta-button w-full mt-4">Registrarse</button>
            </form>
            <div class="panel-footer mt-4">
                <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 TravelWorld</p>
    </footer>

    <script>
    function enviarFormulario(e) {
        e.preventDefault();
        alert("¡Formulario de registro enviado correctamente!");
        document.getElementById("miFormulario").reset();
    }
    </script>
</body>
</html>
